; QuotaTV — Claude + Codex 额度显示器
; 板子: ESP32-C3-DevKitM-1
; 屏幕: 1.8" ST7735 128x160 SPI

[env:esp32c3_st7735]
platform = espressif32@^6.7.0
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.flash_mode = dio

lib_deps =
  bodmer/TFT_eSPI@^2.5.43
  bblanchon/ArduinoJson@^7.1.0

build_flags =
  ; ---- USB CDC 串口日志 (DevKitM-1 用板载 UART 桥,保持关闭即可) ----
  ;-D ARDUINO_USB_CDC_ON_BOOT=1

  ; ---- TFT_eSPI: ST7735 128x160 SPI ----
  -D USER_SETUP_LOADED=1
  -D ST7735_DRIVER=1
  ; !! 屏幕变体: 若显示偏移/颜色不对,依次换成
  ;    ST7735_REDTAB / ST7735_BLACKTAB / ST7735_GREENTAB2 / ST7735_GREENTAB3
  -D ST7735_GREENTAB=1
  -D TFT_WIDTH=128
  -D TFT_HEIGHT=160
  ; ---- 接线 (见 README 接线表) ----
  -D TFT_MISO=-1
  -D TFT_SCLK=4
  -D TFT_MOSI=6
  -D TFT_CS=7
  -D TFT_DC=5
  -D TFT_RST=10
  ; 背光由 config.h 里 PIN_TFT_BL 控制 (GPIO3, PWM)
  -D LOAD_GLCD=1
  -D LOAD_FONT2=1
  -D LOAD_FONT4=1
  -D LOAD_GFXFF=1
  -D SMOOTH_FONT=0
  -D SPI_FREQUENCY=27000000
  ; 颜色反了(蓝橙互换)就把下面这行的 0 改 1
  -D TFT_RGB_ORDER=TFT_BGR
