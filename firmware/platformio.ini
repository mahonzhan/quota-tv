; QuotaTV — Claude + Codex 额度显示器
; 板子: ESP32-C3-DevKitM-1
; 屏幕: 1.8" ST7735 128x160 SPI

[env:esp32c3_st7735]
; 必须钉在 6.5.0 (= Arduino core 2.0.14):
; TFT_eSPI 2.5.43 在 core 2.0.15+ 的 ESP32-C3 上 tft.init() 会
; Store access fault 崩溃重启, 见 Bodmer/TFT_eSPI#3464
platform = espressif32@6.5.0
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.flash_mode = dio

lib_deps =
  bodmer/TFT_eSPI@^2.5.43
  bblanchon/ArduinoJson@^7.1.0

build_flags =
  ; ---- USB CDC 串口日志 (DevKitM-1 用板载 UART 桥,保持关闭即可) ----
  ;-D ARDUINO_USB_CDC_ON_BOOT=1

  ; ---- TFT_eSPI: ST7735 128x160 SPI ----
  -D USER_SETUP_LOADED=1
  -D ST7735_DRIVER=1
  ; !! 屏幕变体: 此蓝板 (1.8'TFT128*RGB*160) 实测为 REDTAB
  ;    其他批次若偏移/花屏, 依次试 ST7735_BLACKTAB / GREENTAB / GREENTAB2 / GREENTAB3
  -D ST7735_REDTAB=1
  -D TFT_WIDTH=128
  -D TFT_HEIGHT=160
  ; ---- 接线 (见 README 接线表) ----
  -D TFT_MISO=-1
  -D TFT_SCLK=4
  -D TFT_MOSI=6
  -D TFT_CS=7
  -D TFT_DC=5
  -D TFT_RST=10
  ; 背光由 config.h 里 PIN_TFT_BL 控制 (GPIO3, PWM)
  -D LOAD_GLCD=1
  -D LOAD_FONT2=1
  -D LOAD_FONT4=1
  -D LOAD_GFXFF=1
  -D SMOOTH_FONT=0
  -D SPI_FREQUENCY=27000000
  ; 实测此批蓝板需要 TFT_RGB (若橙色显示成蓝色, 在 TFT_RGB/TFT_BGR 间切换)
  -D TFT_RGB_ORDER=TFT_RGB
